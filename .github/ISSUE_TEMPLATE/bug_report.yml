name: Bug 报告
description: 提交一个 Bug 报告
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个 Bug
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
  - type: input
    id: version
    attributes:
      label: 版本号
      placeholder: v1.0.0
  - type: dropdown
    id: device
    attributes:
      label: 设备
      options:
        - Android 手机
        - Android 平板
        - 模拟器